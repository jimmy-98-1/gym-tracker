<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="theme-color" content="#f5f5f7"/>
<!-- SECURITY: CSP restricts script/style sources to same origin, blocks inline eval and external resource injection -->
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'none'; object-src 'none'; base-uri 'self'"/>
<title>Historial · Gym Tracker</title>
<link rel="stylesheet" href="css/styles.css"/>
</head>
<body>

<div class="topbar">
  <div class="topbar-row">
    <span class="app-title">Historial</span>
    <div class="topbar-right">
      <button class="dark-toggle" id="theme-toggle" onclick="toggleTheme()" title="Cambiar tema">🌙</button>
      <span class="week-badge" id="week-badge"></span>
      <button class="logout-btn" onclick="logout()">Salir</button>
    </div>
  </div>
</div>

<div class="bib-header">
  <div class="bib-title">Tu progreso</div>
  <div class="bib-sub" id="bib-sub">—</div>
</div>

<!-- Calendar + Stats side by side -->
<div class="cal-stats-row">

  <div class="cal-compact">
    <div class="cal-nav">
      <button class="cal-nav-btn" onclick="calPrev()">‹</button>
      <span class="cal-month-label" id="cal-month-label"></span>
      <button class="cal-nav-btn" onclick="calNext()">›</button>
    </div>
    <div class="cal-weekdays">
      <span>L</span><span>M</span><span>X</span><span>J</span><span>V</span><span>S</span><span>D</span>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
    <div class="cal-legend">
      <span class="cal-legend-item"><span class="cal-dot complete"></span>Hecho</span>
      <span class="cal-legend-item"><span class="cal-dot partial"></span>Parcial</span>
    </div>
  </div>

  <div class="side-stats" id="side-stats"></div>

</div>

<!-- Day detail bottom sheet -->
<div class="day-detail-overlay" id="day-detail-overlay" onclick="handleDetailOverlayClick(event)">
  <div class="day-detail-sheet">
    <div class="day-detail-header">
      <div class="day-detail-header-text">
        <div class="day-detail-title" id="dd-title"></div>
        <div class="day-detail-meta" id="dd-meta"></div>
      </div>
      <button class="day-detail-close" onclick="closeDayDetail()">✕</button>
    </div>
    <div class="day-detail-body" id="dd-body"></div>
  </div>
</div>

<!-- Muscle volume section -->
<div id="muscle-section" class="muscle-section"></div>

<!-- Progression section -->
<div id="prog-section" class="prog-section"></div>

<!-- Day detail bottom sheet -->

<nav class="bottom-nav">
  <a class="nav-item" href="tracker.html">
    <span class="nav-icon">💪</span>
    <span class="nav-label">Tracker</span>
  </a>
  <a class="nav-item" href="rutina.html">
    <span class="nav-icon">📋</span>
    <span class="nav-label">Rutina</span>
  </a>
  <a class="nav-item active" href="biblioteca.html">
    <span class="nav-icon">📊</span>
    <span class="nav-label">Historial</span>
  </a>
</nav>

<script src="js/theme.js"></script>
<script src="js/data.js"></script>
<script src="js/exercises.js"></script>
<script src="js/biblioteca.js"></script>
</body>
</html>
