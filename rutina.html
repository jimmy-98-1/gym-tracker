<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="theme-color" content="#f5f5f7"/>
<!-- SECURITY: CSP restricts script/style sources to same origin, blocks inline eval and external resource injection -->
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'none'; object-src 'none'; base-uri 'self'"/>
<title>Rutina · Gym Tracker</title>
<link rel="stylesheet" href="css/styles.css"/>
</head>
<body>

<div class="topbar">
  <div class="topbar-row">
    <span class="app-title">Mi Rutina</span>
    <div class="topbar-right">
      <button class="dark-toggle" id="theme-toggle" onclick="toggleTheme()" title="Cambiar tema">🌙</button>
      <span class="week-badge" id="week-badge"></span>
      <button class="logout-btn" onclick="logout()">Salir</button>
    </div>
  </div>
</div>

<div class="rut-header">
  <div class="rut-title">Personaliza tu semana</div>
  <div class="rut-sub">Toca un día para editar sus ejercicios</div>
</div>

<div class="rut-container" id="rutina-container"></div>

<div class="rut-actions">
  <button class="save-btn" onclick="saveRoutine()">Guardar rutina</button>
  <button class="rut-clear-btn" onclick="confirmClear()">Limpiar rutina</button>
</div>

<!-- Exercise Picker Overlay -->
<div class="picker-overlay" id="picker-overlay">
  <div class="picker-sheet">
    <div class="picker-header">
      <span class="picker-title">Añadir ejercicio</span>
      <button class="picker-close" onclick="closePicker()">✕</button>
    </div>
    <div class="picker-chips-wrap" id="picker-chips-wrap">
      <div class="picker-chips" id="picker-chips"></div>
    </div>
    <div class="picker-list" id="picker-list"></div>
  </div>
</div>

<!-- Confirm Clear Overlay -->
<div class="confirm-overlay" id="confirm-overlay">
  <div class="confirm-card">
    <div class="confirm-icon">🗑️</div>
    <div class="confirm-title">¿Limpiar rutina?</div>
    <div class="confirm-desc">Se eliminarán todos los ejercicios de todos los días. No afecta a tu historial.</div>
    <button class="confirm-btn-danger" onclick="doClear()">Sí, limpiar</button>
    <button class="confirm-btn-cancel" onclick="cancelClear()">Cancelar</button>
  </div>
</div>

<!-- Exercise edit bottom sheet -->
<div class="ex-edit-overlay" id="ex-edit-overlay" onclick="handleExEditOverlayClick(event)">
  <div class="ex-edit-sheet">
    <div class="ex-edit-header">
      <div class="ex-edit-name" id="ex-edit-name"></div>
      <button class="picker-close" onclick="closeExEdit()">✕</button>
    </div>
    <div class="ex-edit-fields">
      <div class="ex-edit-field">
        <label class="ex-edit-label">Series</label>
        <input class="ex-edit-input" id="ex-edit-sets" type="number" min="1" max="10" placeholder="4"/>
      </div>
      <div class="ex-edit-field">
        <label class="ex-edit-label">Reps</label>
        <input class="ex-edit-input" id="ex-edit-reps" type="text" placeholder="8–12"/>
      </div>
      <div class="ex-edit-field">
        <label class="ex-edit-label">RPE objetivo</label>
        <input class="ex-edit-input" id="ex-edit-rpe" type="text" placeholder="7–8"/>
      </div>
      <div class="ex-edit-field">
        <label class="ex-edit-label">Descanso</label>
        <input class="ex-edit-input" id="ex-edit-rest" type="text" placeholder="2 min"/>
      </div>
    </div>
    <button class="save-btn" onclick="saveExEdit()">Guardar cambios</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Persistent timer banner (shown when a rest timer is running in Tracker) -->
<div class="timer-banner" id="timer-banner" style="display:none">
  <a class="timer-banner-inner" href="tracker.html">
    <span class="timer-banner-ex" id="timer-banner-ex">Descanso</span>
    <span class="timer-banner-time" id="timer-banner-time">–:––</span>
    <span class="timer-banner-hint">⏱ Volver</span>
  </a>
</div>

<nav class="bottom-nav">
  <a class="nav-item" href="tracker.html">
    <span class="nav-icon">💪</span>
    <span class="nav-label">Tracker</span>
  </a>
  <a class="nav-item active" href="rutina.html">
    <span class="nav-icon">📋</span>
    <span class="nav-label">Rutina</span>
  </a>
  <a class="nav-item" href="biblioteca.html">
    <span class="nav-icon">📊</span>
    <span class="nav-label">Historial</span>
  </a>
</nav>

<script>
(function() {
  var banner = document.getElementById('timer-banner');
  var elEx = document.getElementById('timer-banner-ex');
  var elTime = document.getElementById('timer-banner-time');
  function update() {
    try {
      var raw = sessionStorage.getItem('gymTimerState');
      if (!raw) { banner.style.display = 'none'; return; }
      var state = JSON.parse(raw);
      var secs;
      if (state.pausedRemaining != null) {
        secs = state.pausedRemaining;
      } else if (state.endTime) {
        secs = Math.max(0, Math.ceil((state.endTime - Date.now()) / 1000));
      } else { banner.style.display = 'none'; return; }
      if (secs <= 0) { banner.style.display = 'none'; sessionStorage.removeItem('gymTimerState'); return; }
      banner.style.display = 'block';
      elEx.textContent = state.exName || 'Descanso';
      var m = Math.floor(secs / 60), s = secs % 60;
      elTime.textContent = m + ':' + (s < 10 ? '0' : '') + s;
    } catch(e) { banner.style.display = 'none'; }
  }
  update();
  setInterval(update, 1000);
})();
</script>

<!-- SECURITY: auth.js before data.js — supplies session/crypto functions -->
<script src="js/theme.js"></script>
<script src="js/auth.js"></script>
<script src="js/data.js"></script>
<script src="js/exercises.js"></script>
<script src="js/utils.js"></script>
<script src="js/rutina.js"></script>
</body>
</html>
