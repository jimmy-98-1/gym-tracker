<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="theme-color" content="#f5f5f7"/>
<!-- SECURITY: CSP restricts script/style sources to same origin, blocks inline eval and external resource injection -->
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'none'; object-src 'none'; base-uri 'self'"/>
<title>Gym Tracker</title>
<link rel="stylesheet" href="css/styles.css"/>
</head>
<body class="login-page">

<div class="login-wrap">
  <div class="login-logo">🏋️</div>
  <div class="login-title">Gym Tracker</div>
  <div class="login-sub">Registra tu progreso, semana a semana</div>
  <div class="login-card" id="login-card"></div>
</div>

<!-- SECURITY: auth.js must load before data.js — provides encryptJSON/decryptJSON/getSession used by data.js -->
<script src="js/theme.js"></script>
<script src="js/auth.js"></script>
<script src="js/data.js"></script>
<script src="js/utils.js"></script>
<script src="js/login.js"></script>
</body>
</html>
